site_name: AsyncMQ
site_description: The broker you needed for your tasks.
site_url: https://asyncmq.dymmond.com
docs_dir: docs/generated
site_dir: site
theme:
  name: material
  custom_dir: docs/generated/overrides
  language: en
  palette:
  - scheme: default
    primary: lime
    accent: pink
    media: '(prefers-color-scheme: light)'
    toggle:
      icon: material/lightbulb
      name: Switch to dark mode
  - scheme: slate
    media: '(prefers-color-scheme: dark)'
    primary: lime
    accent: amber
    toggle:
      icon: material/lightbulb-outline
      name: Switch to light mode
  favicon: statics/favicon.ico
  logo: statics/asyncmq-white.png
  features:
  - search.suggest
  - search.highlight
  - content.tabs.link
  - content.code.copy
  - content.code.annotate
  - content.tooltips
  - content.code.select
  - navigation.indexes
  - navigation.path
repo_name: dymmond/asyncmq
repo_url: https://github.com/dymmond/asyncmq
edit_uri: ''
extra_css:
  - stylesheets/extra.css
plugins:
- search
- meta-descriptions:
    export_csv: false
    quiet: false
    enable_checks: false
    min_length: 50
    max_length: 160
    trim: false
nav:
- Introduction: index.md
- Installation: installation.md
- Features:
  - features/index.md
  - features/quickstart.md
  - features/core-concepts.md
  - features/tasks.md
  - features/jobs.md
  - features/queues.md
  - features/workers.md
  - features/runners.md
  - features/schedulers.md
  - features/flows.md
  - features/settings.md
  - features/custom-json.md
  - features/logging.md
  - features/sandbox.md
  - features/cli.md
  - Backends:
    - features/backends/overview.md
    - features/backends/postgres-backend.md
    - features/backends/rabbitmq.md
- How-To:
  - how-to/index.md
  - how-to/switch-backends.md
  - how-to/failed-jobs.md
  - how-to/testing.md
- Learn:
  - learn/index.md
  - learn/integration.md
  - learn/advanced-patterns.md
  - learn/performance-tuning-and-benchmarks.md
  - learn/security-and-compliance.md
- Dashboard:
  - dashboard/dashboard.md
  - dashboard/jwt.md
- Reference:
  - reference/index.md
  - reference/settings-reference.md
  - reference/cli-reference.md
  - reference/backend-capabilities.md
- Troubleshooting: troubleshooting.md
- Contributing: contributing.md
- Sponsorship: sponsorship.md
- Release Notes: release-notes.md
markdown_extensions:
- attr_list
- toc:
    permalink: true
- admonition
- pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.inlinehilite
- pymdownx.highlight:
    use_pygments: true
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- md_in_html

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/dymmond/asyncmq
    - icon: fontawesome/brands/discord
      link: https://discord.gg/XVeWXSrJ
