<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="{{ favicon }}"/>
  <title>AsyncMQ | Sign in</title>
  <link rel="stylesheet" href="{{ url_for('statics', path='/css/tailwind-4.3.2.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('statics', path='/css/asyncmq.css') }}">
  <script src="{{ url_for('statics', path='/js/asyncmq.js') }}"></script>
  <script defer src="{{ url_for('statics', path='/vendor/alpinejs/alpine-csp-3.15.12.min.js') }}"></script>
</head>
<body class="amq-auth-body">
  {% include "shared/loading.html" %}

  <main class="amq-auth-shell">
    <div class="amq-auth-panel">
      <div class="amq-auth-brand">
        <span class="amq-auth-mark">MQ</span>
        <span class="amq-auth-title">
          <strong>{{ header_text|default("AsyncMQ") }}</strong>
          <span>Operations Console</span>
        </span>
      </div>

      {% include "shared/messages.html" %}

      <section class="amq-auth-card" aria-labelledby="login-title">
        <h1 id="login-title" class="amq-auth-heading">Sign In</h1>
        <p class="amq-auth-copy">Use an authorized operator account.</p>

        {% if error %}
          <div class="amq-auth-error" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_prefix }}/login" class="amq-auth-form">
          <input type="hidden" name="next" value="{{ next or '' }}"/>

          <label class="amq-field" for="username">
            <span>Username</span>
            <input id="username"
                   name="username"
                   autocomplete="username"
                   required
                   class="amq-input">
          </label>

          <label class="amq-field" for="password">
            <span>Password</span>
            <span class="amq-auth-password" x-data="asyncmqPassword">
              <input id="password"
                     name="password"
                     type="password"
                     autocomplete="current-password"
                     required
                     x-bind:type="inputType"
                     class="amq-input">
              <button type="button"
                      class="amq-button"
                      x-bind:aria-label="label"
                      x-bind:aria-pressed="pressed"
                      x-on:click="toggle">
                <span x-text="label">Show password</span>
              </button>
            </span>
          </label>

          <button type="submit" class="amq-button amq-button--primary">Sign In</button>
        </form>
      </section>

      <div class="amq-auth-footer">
        <a href="{{ url_prefix }}" class="amq-button">Back to Dashboard</a>
      </div>
    </div>
  </main>
</body>
</html>
