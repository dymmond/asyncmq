<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="{{ favicon|default(url_prefix ~ '/static/favicon.ico') }}"/>
  <title>AsyncMQ | Not Found</title>
  <link rel="stylesheet" href="{{ url_for('statics', path='/css/tailwind-4.3.2.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('statics', path='/css/asyncmq.css') }}">
</head>
<body class="amq-auth-body">
  <main class="amq-auth-shell">
    <section class="amq-error-page" aria-labelledby="error-title">
      <div class="amq-error-code">404</div>
      <h1 id="error-title" class="amq-error-title">Page Not Found</h1>
      <p class="amq-error-copy">The dashboard route is unavailable or has moved.</p>
      <div class="amq-actions">
        <a href="{{ url_prefix }}" class="amq-button amq-button--primary">Dashboard Home</a>
        <a href="{{ url_prefix }}/queues" class="amq-button">Queues</a>
      </div>
    </section>
  </main>
</body>
</html>
