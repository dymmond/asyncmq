{% extends "layout.html" %}
{% block content %}
  <div class="amq-page">
    <section class="amq-section">
      <div class="amq-section-header">
        <div>
          <h2 class="amq-section-title">New Repeatable</h2>
          <p class="amq-section-meta">Queue {{ queue }} / create a backend-owned schedule definition</p>
        </div>
        <div class="amq-actions">
          <a href="{{ url_prefix }}/queues/{{ queue }}/repeatables" class="amq-button">Back to Repeatables</a>
        </div>
      </div>
    </section>

    <form method="post" class="amq-card amq-form-card">
      <div class="amq-card-header">
        <h2 class="amq-card-title">Schedule Definition</h2>
        <span class="amq-card-meta">Provide an interval or cron expression</span>
      </div>
      <div class="amq-card-body amq-form-grid">
        <label class="amq-field amq-field-wide" for="task_id">
          <span>Task ID</span>
          <input id="task_id"
                 name="task_id"
                 type="text"
                 required
                 value="{{ job_def.task_id }}"
                 class="amq-input">
        </label>

        <label class="amq-field" for="every">
          <span>Every seconds</span>
          <input id="every"
                 name="every"
                 type="number"
                 min="1"
                 value="{{ job_def.every or '' }}"
                 class="amq-input">
        </label>

        <label class="amq-field" for="cron">
          <span>Cron expression</span>
          <input id="cron"
                 name="cron"
                 type="text"
                 value="{{ job_def.cron or '' }}"
                 class="amq-input">
        </label>
      </div>
      <div class="amq-form-actions">
        <a href="{{ url_prefix }}/queues/{{ queue }}/repeatables" class="amq-button">Cancel</a>
        <button type="submit" class="amq-button amq-button--primary">Create Repeatable</button>
      </div>
    </form>
  </div>
{% endblock %}
