---
name: CodSpeed

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why benchmarks are being run"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
      - name: "Install dependencies"
        run: pip install -e ".[testing]"
      - name: "Run benchmarks"
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: pytest benchmarks/ --codspeed
